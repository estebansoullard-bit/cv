<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur de Lettre de Motivation</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col justify-between font-sans">

    <header class="bg-indigo-600 text-white py-6 shadow-md text-center">
        <h1 class="text-3xl font-bold tracking-tight">Générateur de Lettre de Motivation</h1>
        <p class="text-indigo-200 mt-2 font-medium">Connexion directe et instantanée</p>
    </header>

    <main class="max-w-5xl w-full mx-auto p-4 md:p-8 flex-grow grid grid-cols-1 md:grid-cols-2 gap-8">
        
        <section class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col justify-between space-y-6">
            <div class="space-y-4">
                <h2 class="text-xl font-semibold text-gray-800 border-b pb-2">1. Informations du poste</h2>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label for="jobTitle" class="block text-sm font-medium text-gray-700 mb-1">Poste visé *</label>
                        <input type="text" id="jobTitle" placeholder="Ex: Commercial" class="w-full px-4 py-2 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                    </div>
                    <div>
                        <label for="companyName" class="block text-sm font-medium text-gray-700 mb-1">Entreprise *</label>
                        <input type="text" id="companyName" placeholder="Ex: Décathlon" class="w-full px-4 py-2 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                    </div>
                </div>

                <h2 class="text-xl font-semibold text-gray-800 border-b pb-2 pt-2">2. Votre CV (Contenu textuel)</h2>
                
                <div>
                    <label for="cvContent" class="block text-sm font-medium text-gray-700 mb-1">Ouvrez votre CV, copiez tout son texte (Ctrl+A / Ctrl+C) et collez-le ici *</label>
                    <textarea id="cvContent" rows="8" placeholder="Collez le texte de votre CV ici..." class="w-full px-4 py-2 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500 text-sm font-mono bg-gray-50 focus:bg-white transition-all"></textarea>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label for="userFirstName" class="block text-sm font-medium text-gray-700 mb-1">Votre Prénom</label>
                        <input type="text" id="userFirstName" placeholder="Optionnel" class="w-full px-4 py-2 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                    </div>
                    <div>
                        <label for="userLastName" class="block text-sm font-medium text-gray-700 mb-1">Votre Nom</label>
                        <input type="text" id="userLastName" placeholder="Optionnel" class="w-full px-4 py-2 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                    </div>
                </div>

                <h2 class="text-xl font-semibold text-gray-800 border-b pb-2 pt-2">3. Paramètres de l'IA</h2>
                
                <div>
                    <label for="apiKey" class="block text-sm font-medium text-emerald-700 font-semibold mb-1">Votre clé API Gemini</label>
                    <input type="text" id="apiKey" placeholder="Collez votre clé AIzaSy... ici" class="w-full px-4 py-2 border border-emerald-300 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none text-xs bg-emerald-50">
                </div>
            </div>

            <button onclick="generateLetter()" id="generateBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-4 rounded-lg shadow transition mt-4">
                Rédiger ma lettre de motivation
            </button>
        </section>

        <section class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col">
            <h2 class="text-xl font-semibold text-gray-800 border-b pb-2 mb-4">Votre lettre générée</h2>
            
            <div id="outputContainer" class="flex-grow border border-gray-200 rounded-lg p-4 bg-gray-50 overflow-y-auto whitespace-pre-line text-sm text-gray-700 leading-relaxed min-h-[420px]">
                <span class="text-gray-400 italic">Remplissez les champs à gauche, puis cliquez sur le bouton pour lancer la rédaction...</span>
            </div>

            <button id="copyBtn" onclick="copyToClipboard()" class="mt-4 w-full bg-gray-800 hover:bg-gray-900 text-white font-medium py-2 px-4 rounded-lg transition opacity-50 cursor-not-allowed" disabled>
                Copier le texte rédigé
            </button>
        </section>

    </main>

    <footer class="bg-gray-800 text-gray-400 text-center py-4 text-sm mt-8">
        &copy; 2026 - Assistant Recrutement Personnel
    </footer>

    <script>
        async function generateLetter() {
            const jobTitle = document.getElementById('jobTitle').value.trim();
            const companyName = document.getElementById('companyName').value.trim();
            const cvText = document.getElementById('cvContent').value.trim();
